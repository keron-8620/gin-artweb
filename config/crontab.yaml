################ mds计划任务 #######################
# 本配置仅用于创建mds集群时自动注册的计划任务时间
# 计划任务实际注册时间以数据库为准
mds:  
  mon.sh: "30 6 * * 1-5"
  bse.sh: "2 8 * * 1-5"
  sse.sh: "5 8 * * 1-5"
  szse.sh: "36 7 * * 1-5"
  backup.sh: "0 20 * * 1-5"
################ mds计划任务 #######################

################ stk计划任务 #######################
# 本配置仅用于创建stk集群时自动注册的计划任务时间
# 计划任务实际注册时间以数据库为准
stk: 
  mon.sh: "30 6 * * 1-5"
  counter_fetch.sh: "30 7 * * 1-5"
  counter_distribute.sh: "40 7 * * 1-5"
  bse.sh: "2 8 * * 1-5"
  sse.sh: "5 8 * * 1-5"
  szse.sh: "36 7 * * 1-5"
  csdc.sh: "35 7 * * 1-5"
  backup.sh: "0 20 * * 1-5"
################ stk计划任务 #######################

